# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: opencode-orc

builds:
  - id: opencode-orc
    main: .
    binary: opencode-orc
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - freebsd
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s
      - -w

archives:
  - id: opencode-orc-binaries
    ids:
      - opencode-orc
    formats: ["zip", "tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: "{{ .Env.GITHUB_REPOSITORY_NAME }}"

changelog:
  use: github